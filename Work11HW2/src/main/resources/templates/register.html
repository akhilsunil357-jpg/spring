<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>

    <!-- Styling -->
    <style>
        body {
            background: url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f') no-repeat center center/cover;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .main-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 30px;
            width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);

            /* ✅ text color override */
            color: black;
        }

        .glass-card h3 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            color: black;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.3);
            border: none;

            /* ✅ input text */
            color: black;
        }

        .form-control::placeholder {
            color: #555;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.5);
            box-shadow: none;
            color: black;
        }

        label {
            font-weight: 500;
            color: black;
        }

        input[type="date"] {
            color: black;
        }

        .btn-custom {
            background: #00c6ff;
            border: none;
            color: white;
            font-weight: bold;
        }

        .btn-custom:hover {
            background: #0072ff;
        }

        .alert {
            background: rgba(0, 255, 0, 0.2);
            border: none;

            /* ✅ alert text */
            color: black;
        }
    </style>
</head>

<body>

<div class="main-container">
    <div class="glass-card">

        <h3>Registration</h3>

        <!-- Success Message -->
        <div class="alert text-center" th:if="${message}">
            [[${message}]]
        </div>

        <form th:action="@{/registration}" method="post" th:object="${user}">

            <div class="form-group">
                <label>Full Name</label>
                <input th:field="*{fullname}" type="text" class="form-control" placeholder="Enter full name" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input th:field="*{email}" type="email" class="form-control" placeholder="Enter email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input th:field="*{password}" type="password" id="password" class="form-control" placeholder="Enter password" required>
            </div>

            <div class="form-group">
                <label>Date of Birth</label>
                <input th:field="*{dob}" type="date" class="form-control" required>
            </div>

            <div class="form-group">
                <label>Address</label>
                <textarea th:field="*{address}" class="form-control" rows="2" placeholder="Enter address" required></textarea>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm password" required>
            </div>

            <button type="submit" class="btn btn-custom btn-block" onclick="return Validate()">Register</button>

        </form>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="myModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title text-danger">Error</h5>
                <button type="button" class="close" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body">
                Passwords do not match
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" data-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script>
function Validate() {
    var password = document.getElementById("password").value;
    var confirmPassword = document.getElementById("confirmPassword").value;

    if (password !== confirmPassword) {
        $('#myModal').modal();
        return false;
    }
    return true;
}
</script>

</body>
</html>
