<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Update Product</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">

        <h1 class="text-center mb-4">Update Product</h1>

        <form action="#" th:action="@{/update/{id}(id=${productDetails.id})}" method="post">
            
            <div class="mb-3">
                <label class="form-label">Name:</label>
                <input type="text" class="form-control" name="name" th:value="${productDetails.name}" required />
            </div>

            <div class="mb-3">
                <label class="form-label">Description:</label>
                <input type="text" class="form-control" name="description" th:value="${productDetails.description}" required />
            </div>

            <div class="mb-3">
                
                <label class="form-label">Price:</label>
                <input type="text" class="form-control" name="price" th:value="${productDetails.price}" required />
            </div>

            <div class="text-center">
                <input type="submit" class="btn btn-success px-4" value="Update" />
            </div>

        </form>

    </div>
</div>

</body>
</html>
