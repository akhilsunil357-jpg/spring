<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Delete Product</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4 text-center">

        <h1 class="mb-4 text-danger">Delete Product</h1>

        <p class="fs-5">
            Are you sure you want to delete 
            <strong th:text="${productDetails.name}"></strong>?
        </p>

        <form action="#" th:action="@{/delete/{id}(id=${productDetails.id})}" method="post" class="mt-3">
            <input type="hidden" name="name" th:value="${productDetails.name}" />
            
            <button type="submit" class="btn btn-danger px-4 me-2">Delete</button>
            <a href="/all" class="btn btn-secondary px-4">Cancel</a>
        </form>

    </div>
</div>

</body>
</html>
