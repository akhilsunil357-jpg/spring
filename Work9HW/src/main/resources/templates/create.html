<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Product</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Background + Glass Effect -->
    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1508780709619-79562169bc64');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* DARK TEXT FOR BETTER READABILITY */
        h1 {
            color: #212529;
        }

        label {
            color: #343a40;
            font-weight: 500;
        }

        p {
            color: #198754; /* Bootstrap success green */
        }

        .form-control {
            background: rgba(255, 255, 255, 0.9);
            border: none;
        }

        .form-control:focus {
            box-shadow: none;
            border: 1px solid #0d6efd;
        }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow p-4">
    
    <h1 class="text-center mb-4">Create Product</h1>
    
    <p class="text-center" th:text="${message}"></p>
    
    <form action="#" th:action="@{/create}" method="post">
      
      <div class="mb-3">
        <label class="form-label">Name:</label>
        <input type="text" class="form-control" name="name" required />
      </div>
      
      <div class="mb-3">
        <label class="form-label">Description:</label>
        <input type="text" class="form-control" name="description" required />
      </div>
      
      <div class="mb-3">
        <label class="form-label">Price:</label>
        <input type="text" class="form-control" name="price" required />
      </div>
      
      <div class="text-center">
        <input type="submit" class="btn btn-primary px-4" value="Create" />
      </div>
      
    </form>

  </div>
</div>

</body>
</html>
