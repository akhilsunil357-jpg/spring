<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product Details</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg p-4" style="width: 400px; border-radius: 15px;">
        
        <h2 class="text-center mb-4 text-primary">🍽 Product Details</h2>

        <div class="mb-3">
            <h5 class="text-muted">Dish Name</h5>
            <p class="fs-4 fw-bold">[[${product.name}]]</p>
        </div>

        <div class="mb-3">
            <h5 class="text-muted">Price</h5>
            <p class="fs-4 fw-bold text-success">₹ [[${product.price}]]</p>
        </div>

        <div class="text-center">
            <a href="/" class="btn btn-primary mt-3">Back</a>
        </div>

    </div>

</div>

</body>
</html>
